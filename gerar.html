<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Key - Sistema 23h</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .timer-box {
            background: #1a1a1a;
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
        }
        .timer {
            font-size: 3rem;
            font-weight: bold;
            color: #00ff88;
            margin: 10px 0;
            font-family: monospace;
        }
        .key-box {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            border: 2px dashed #00ff88;
            display: none;
        }
        .key-box.active {
            display: block;
        }
        .key-value {
            font-size: 1.3rem;
            color: #00ff88;
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
            padding: 10px;
            background: #000;
            border-radius: 5px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .error-box {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .error-box.active {
            display: block;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        .warning.active {
            display: block;
        }
        .debug-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #333;
            display: none;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 GERAR KEY FREE</h1>

        <div class="error-box" id="etapaError">
            ❌ Complete as etapas 1 e 2 primeiro!
        </div>

        <div class="warning" id="keyWarning">
            ⏳ Carregando sua key anterior...
        </div>

        <!-- Timer 23h -->
        <div class="timer-box">
            <div id="statusTexto">⏳ Próxima key disponível em:</div>
            <div class="timer" id="timer">23:00:00</div>
            <small>Keys expiram após 23h</small>
        </div>

        <!-- Área da Key -->
        <div class="key-box" id="keyBox">
            <strong style="color: #00ff88;">SUA KEY:</strong>
            <div class="key-value" id="keyValue"></div>
            <button class="btn btn-secondary" onclick="copiarKey()">📋 COPIAR KEY</button>
        </div>

        <!-- Botão Gerar -->
        <button class="btn" id="gerarBtn" onclick="gerarKey()">
            🎯 GERAR NOVA KEY
        </button>

        <!-- Informações -->
        <div class="info">
            <strong>📌 REGRAS:</strong><br>
            • 1 key a cada 23h por usuário<br>
            • Key FREE válida por 23h<br>
            • Complete os 2 anúncios para gerar<br>
            • Keys são salvas no JSONBin.io
        </div>

        <div id="mensagem" class="status"></div>
        <div id="debug" class="debug-info"></div>
    </div>

    <script>
        // ================= CONFIGURAÇÕES JSONBIN.IO (SUAS CREDENCIAIS) =================
        const JSONBIN_CONFIG = {
            MASTER_KEY: '$2a$10$jMH5yqMerWA9aA59MyJnD.woraFMqdKh6ZZRp7Yx9ns2I5nqYxicC',
            BIN_ID: '69b2d6cc99b15f1d783632de',
            ACCESS_KEY: '$2a$10$J1I.PTOsjvkFRHnxzVHWwe3k9BfiospdS/S5TcSGKVazqenOkW.We'
        };

        const API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`;
        const API_HEADERS = {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY,
            'X-Access-Key': JSONBIN_CONFIG.ACCESS_KEY
        };

        // ================= VERIFICA ETAPAS =================
        function verificarEtapas() {
            const etapa1 = localStorage.getItem('etapa1');
            const etapa2 = localStorage.getItem('etapa2');
            
            if (etapa1 !== 'concluida' || etapa2 !== 'concluida') {
                document.getElementById('etapaError').classList.add('active');
                document.getElementById('gerarBtn').disabled = true;
                setTimeout(() => window.location.href = 'index.html', 3000);
                return false;
            }
            return true;
        }

        // ================= CONTROLE DE TEMPO =================
        function getTempoRestante() {
            const ultimaKey = localStorage.getItem('ultima_key_timestamp');
            if (!ultimaKey) return 0;
            
            const agora = Date.now();
            const diferenca = agora - parseInt(ultimaKey);
            const tempoRestante = (23 * 60 * 60 * 1000) - diferenca;
            
            return tempoRestante > 0 ? tempoRestante : 0;
        }

        function podeGerar() {
            return getTempoRestante() <= 0;
        }

        function atualizarTimer() {
            const timerEl = document.getElementById('timer');
            const statusTexto = document.getElementById('statusTexto');
            const gerarBtn = document.getElementById('gerarBtn');
            
            if (podeGerar()) {
                timerEl.innerHTML = '✅ DISPONÍVEL!';
                statusTexto.innerHTML = '✨ Você pode gerar uma nova key:';
                if (verificarEtapas()) {
                    gerarBtn.disabled = false;
                }
            } else {
                const tempo = getTempoRestante();
                const horas = Math.floor(tempo / (1000 * 60 * 60));
                const minutos = Math.floor((tempo % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((tempo % (1000 * 60)) / 1000);
                
                timerEl.innerHTML = `${horas.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}:${segundos.toString().padStart(2,'0')}`;
                statusTexto.innerHTML = '⏳ Próxima key disponível em:';
                gerarBtn.disabled = true;
            }
        }

        // ================= JSONBIN.IO =================
        async function buscarKeys() {
            try {
                mostrarDebug('🔄 Buscando keys no JSONBin.io...');
                
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: API_HEADERS
                });
                
                if (!response.ok) {
                    const erroTexto = await response.text();
                    throw new Error(`HTTP ${response.status}: ${erroTexto}`);
                }
                
                const data = await response.json();
                mostrarDebug(`✅ Keys encontradas: ${Object.keys(data.record?.KEYS || {}).length} keys`);
                return data.record || { KEYS: {} };
            } catch (error) {
                console.error('Erro ao buscar keys:', error);
                mostrarDebug(`❌ Erro ao buscar: ${error.message}`);
                return { KEYS: {} };
            }
        }

        async function salvarKeys(dados) {
            try {
                mostrarDebug('🔄 Salvando keys no JSONBin.io...');
                
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: API_HEADERS,
                    body: JSON.stringify(dados)
                });
                
                if (!response.ok) {
                    const erroTexto = await response.text();
                    throw new Error(`HTTP ${response.status}: ${erroTexto}`);
                }
                
                const result = await response.json();
                mostrarDebug(`✅ Keys salvas com sucesso! Total: ${Object.keys(dados.KEYS).length} keys`);
                return result;
            } catch (error) {
                console.error('Erro ao salvar keys:', error);
                mostrarDebug(`❌ Erro ao salvar: ${error.message}`);
                throw error;
            }
        }

        // ================= GERAR KEY =================
        async function gerarKey() {
            if (!podeGerar()) {
                mostrarMensagem('Aguarde 23h para gerar outra key!', 'error');
                return;
            }

            if (!verificarEtapas()) return;

            const gerarBtn = document.getElementById('gerarBtn');
            gerarBtn.disabled = true;
            gerarBtn.innerHTML = '⏳ GERANDO...';

            try {
                // Gera key única
                const timestamp = Date.now().toString(36).toUpperCase();
                const random = Math.random().toString(36).substring(2, 10).toUpperCase();
                const novaKey = `FREE-${timestamp}-${random}`;
                
                const expiracao = new Date();
                expiracao.setHours(expiracao.getHours() + 23);
                
                // Busca keys existentes
                const keysExistentes = await buscarKeys();
                
                // Remove keys expiradas
                const agora = new Date();
                const keysLimpas = { KEYS: {} };
                
                // Copia keys não expiradas
                if (keysExistentes.KEYS) {
                    for (const [key, value] of Object.entries(keysExistentes.KEYS)) {
                        if (new Date(value.Expira) > agora) {
                            keysLimpas.KEYS[key] = value;
                        }
                    }
                }
                
                // Adiciona a nova key
                keysLimpas.KEYS[novaKey] = {
                    Tipo: "FREE",
                    Tag: "USER",
                    Expira: expiracao.toISOString(),
                    Horario: new Date().toLocaleTimeString('pt-BR'),
                    Status: "ativo",
                    Descricao: "Key FREE válida por 23h",
                    Prioridade: 1,
                    Criado_em: new Date().toISOString().split('T')[0],
                    Usuario: localStorage.getItem('user_id') || gerarUserId()
                };

                // Salva no JSONBin.io
                await salvarKeys(keysLimpas);
                
                // Salva localmente
                localStorage.setItem('ultima_key', novaKey);
                localStorage.setItem('ultima_key_timestamp', Date.now().toString());
                localStorage.setItem('ultima_key_expiracao', expiracao.toISOString());
                
                // Mostra a key
                document.getElementById('keyValue').innerText = novaKey;
                document.getElementById('keyBox').classList.add('active');
                
                mostrarMensagem('✅ Key gerada e SALVA no JSONBin.io!', 'success');
                
            } catch (error) {
                console.error('Erro detalhado:', error);
                mostrarMensagem(`Erro ao gerar key. Verifique o console.`, 'error');
            } finally {
                gerarBtn.innerHTML = '🎯 GERAR NOVA KEY';
                gerarBtn.disabled = false;
                atualizarTimer();
            }
        }

        // ================= UTILITÁRIOS =================
        function gerarUserId() {
            const id = 'user_' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
            localStorage.setItem('user_id', id);
            return id;
        }

        function copiarKey() {
            const key = document.getElementById('keyValue').innerText;
            navigator.clipboard.writeText(key).then(() => {
                mostrarMensagem('📋 Key copiada!', 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = key;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                mostrarMensagem('📋 Key copiada!', 'success');
            });
        }

        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.innerText = texto;
            msg.className = `status ${tipo}`;
            
            setTimeout(() => {
                msg.className = 'status';
            }, 3000);
        }

        function mostrarDebug(texto) {
            const debug = document.getElementById('debug');
            debug.innerHTML = texto;
            debug.style.display = 'block';
            
            setTimeout(() => {
                debug.style.display = 'none';
            }, 5000);
        }

        // ================= CARREGAR KEY ANTERIOR =================
        function carregarKeyAnterior() {
            const keyAnterior = localStorage.getItem('ultima_key');
            const expiracao = localStorage.getItem('ultima_key_expiracao');
            
            if (keyAnterior && expiracao && new Date(expiracao) > new Date()) {
                document.getElementById('keyWarning').classList.add('active');
                document.getElementById('keyWarning').innerHTML = '✅ Key anterior ainda válida!';
                document.getElementById('keyValue').innerText = keyAnterior;
                document.getElementById('keyBox').classList.add('active');
                
                setTimeout(() => {
                    document.getElementById('keyWarning').classList.remove('active');
                }, 3000);
            }
        }

        // ================= TESTAR CONEXÃO =================
        async function testarConexao() {
            try {
                mostrarDebug('🔄 Testando conexão com JSONBin.io...');
                const keys = await buscarKeys();
                mostrarDebug('✅ Conexão OK! JSONBin.io funcionando');
            } catch (error) {
                mostrarDebug(`❌ Erro de conexão: ${error.message}`);
            }
        }

        // ================= INICIALIZAÇÃO =================
        window.onload = function() {
            verificarEtapas();
            carregarKeyAnterior();

            if (!localStorage.getItem('user_id')) {
                gerarUserId();
            }

            atualizarTimer();
            setInterval(atualizarTimer, 1000);
            
            // Testa conexão ao carregar
            setTimeout(testarConexao, 1000);
        };
    </script>
</body>
</html>
