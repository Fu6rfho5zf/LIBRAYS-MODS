<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Librays Mods - Sua loja de aplicativos modificados. Baixe os melhores apps modificados gratuitamente!">
    <meta name="keywords" content="apps modificados, jogos mod, spotify premium, apps gratis, librays mods, arm7, arm8, 64 bits, 32 bits">
    <title>Librays Mods | Sua Loja de Apps Modificados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f0f1a;
            --dark-light: #1a1a2a;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --light: #f9fafb;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        /* AJUSTES DE RESPONSIVIDADE GLOBAL */
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%); 
            color: var(--dark); 
            overflow-x: hidden; 
            width: 100%;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: 1rem; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(139, 92, 246, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        .header { background: rgba(15, 15, 26, 0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        
        .logo { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: transform 0.2s; }
        .logo:hover { transform: scale(1.02); }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        .logo-text { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-tabs { display: flex; gap: 0.3rem; background: rgba(255,255,255,0.08); padding: 0.25rem; border-radius: 60px; overflow-x: auto; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tab { padding: 0.5rem 1.2rem; border: none; background: transparent; font-weight: 600; cursor: pointer; border-radius: 40px; transition: all 0.3s; color: var(--gray-light); font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; white-space: nowrap; }
        .nav-tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4); }

        /* CARROSSEL RESPONSIVO */
        .hero-carousel { margin: 1rem 1.5rem; position: relative; border-radius: 1.5rem; overflow: hidden; box-shadow: var(--shadow-xl); }
        .carousel-container { position: relative; width: 100%; height: 280px; }
        .carousel-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; display: none; cursor: pointer; }
        .carousel-slide.active { opacity: 1; display: block; }
        .carousel-banner { width: 100%; height: 100%; position: relative; }
        .carousel-banner-img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.2)); z-index: 1; }
        .carousel-content { position: absolute; bottom: 2rem; left: 2rem; right: 2rem; color: white; z-index: 2; animation: fadeInUp 0.6s ease; }
        .carousel-content h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        
        .section { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; width: 100%; }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.5rem; }
        .section-title { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--dark), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-flex; align-items: center; gap: 0.5rem; }

        /* GRID E CARDS CORRIGIDOS */
        .apps-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 1.2rem; 
            width: 100%;
        }

        .horizontal-scroll { 
            display: flex; 
            gap: 1rem; 
            overflow-x: auto; 
            padding: 0.5rem 0 1.2rem 0; 
            -webkit-overflow-scrolling: touch; 
            scroll-snap-type: x mandatory;
        }

        .app-card { 
            flex: 0 0 240px; /* Tamanho base para o scroll horizontal */
            background: var(--white); 
            border-radius: 1.2rem; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: var(--shadow-md); 
            position: relative;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
        }

        /* No grid de categorias/busca, o card ocupa o espaço total da coluna */
        .apps-grid-2cols .app-card, .apps-grid .app-card { 
            flex: 1 1 auto; 
            width: 100%; 
        }

        .app-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .app-banner { width: 100%; height: 110px; background: #eee; position: relative; overflow: hidden; }
        .app-banner-img { width: 100%; height: 100%; object-fit: cover; }
        .app-badge { position: absolute; top: 0.8rem; right: 0.8rem; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; background: var(--success); color: white; z-index: 2; }
        
        .app-info { padding: 1rem; flex-grow: 1; }
        .app-header { display: flex; gap: 0.8rem; margin-bottom: 0.7rem; }
        .app-logo { width: 48px; height: 48px; background: var(--primary); border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .app-logo-img { width: 100%; height: 100%; object-fit: cover; }
        .app-title h4 { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-developer { font-size: 0.65rem; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-description { font-size: 0.7rem; color: var(--gray); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* MODAL RESPONSIVO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
        .modal-content { max-width: 450px; width: 100%; background: var(--white); border-radius: 2rem; overflow: hidden; animation: scaleIn 0.3s ease; max-height: 90vh; overflow-y: auto; }

        /* AJUSTES MOBILE ESPECÍFICOS */
        @media (max-width: 768px) {
            .header-content { padding: 0.6rem 1rem; flex-direction: column; }
            .carousel-container { height: 180px; }
            .carousel-content h2 { font-size: 1.1rem; }
            .section { padding: 0 1rem; }
            .app-card { flex: 0 0 180px; } /* Cards menores no scroll lateral no mobile */
            
            /* Grid de 2 colunas reais no mobile para Categorias e Busca */
            .apps-grid-2cols { 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 10px; 
            }
        }

        @media (max-width: 480px) {
            .apps-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .app-card { flex: 0 0 150px; }
            .app-banner { height: 80px; }
            .app-title h4 { font-size: 0.8rem; }
        }

        /* Estilos restantes mantidos */
        .carousel-dots { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.6rem; z-index: 3; }
        .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; }
        .carousel-dot.active { background: white; width: 20px; border-radius: 10px; }
        .carousel-prev, .carousel-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; z-index: 3; }
        .carousel-prev { left: 0.5rem; } .carousel-next { right: 0.5rem; }
        .footer { background: var(--dark); color: white; padding: 2rem 1rem; text-align: center; margin-top: 2rem; }
        .arch-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.55rem; font-weight: 700; margin-top: 2px; }
        .arch-badge.arm64 { background: var(--success); color: white; }
        .arch-badge.arm32 { background: var(--warning); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo" onclick="scrollToTop()">
                <div class="logo-icon">📱</div>
                <div class="logo-text">LIBRAYS MODS</div>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-page="home" onclick="showPage('home')"><i class="fas fa-home"></i> HOME</button>
                <button class="nav-tab" data-page="search" onclick="showPage('search')"><i class="fas fa-search"></i> BUSCAR</button>
                <button class="nav-tab" data-page="categories" onclick="showPage('categories')"><i class="fas fa-th-large"></i> CATEGORIAS</button>
                <button class="nav-tab" data-page="updates" onclick="showPage('updates')"><i class="fas fa-clock"></i> ATUALIZAÇÕES</button>
            </div>
        </div>
    </div>

    <div id="homePage" class="page">
        <div class="hero-carousel">
            <div class="carousel-container">
                <button class="carousel-prev" onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
                <button class="carousel-next" onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
                <div id="carouselSlides"></div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>
        <div id="homeSections"></div>
    </div>

    <div id="searchPage" class="page" style="display: none;">
        <div class="section">
            <div class="search-box" style="background:white; padding:1.5rem; border-radius:1.5rem; margin-bottom:1rem;">
                <div class="search-input-group" style="display:flex; gap:10px;">
                    <input type="text" id="searchInputMain" class="search-input" style="flex:1; padding:12px; border-radius:30px; border:1px solid #ddd;" placeholder="Buscar aplicativos..." onkeyup="handleSearchInput()">
                </div>
            </div>
            <div id="searchResultsGrid" class="apps-grid"></div>
        </div>
    </div>

    <div id="categoriesPage" class="page" style="display: none;">
        <div class="section">
            <div id="allCategoriesGrid" style="display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem;"></div>
            <div id="categoryAppsContainer"></div>
        </div>
    </div>

    <div id="updatesPage" class="page" style="display: none;">
        <div class="section">
            <h2 class="section-title"><i class="fas fa-bolt"></i> Atualizações</h2>
            <div id="updatesGrid" class="apps-grid"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="background:var(--primary); padding:2rem; text-align:center; color:white; position:relative;">
                <div class="close-modal" onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer;"><i class="fas fa-times"></i></div>
                <div id="modalLogo" class="modal-logo" style="width:80px; height:80px; background:white; margin:0 auto 10px; border-radius:20px; overflow:hidden;"></div>
                <div id="modalTitle" class="modal-title" style="font-weight:800; font-size:1.2rem;"></div>
            </div>
            <div class="modal-body" style="padding:1.5rem;">
                <div id="modalInfo" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:1rem;"></div>
                <div id="modalDescription" style="background:#f5f5f5; padding:1rem; border-radius:10px; font-size:0.8rem; margin-bottom:1rem;"></div>
                <div id="modalDownloadButtons"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <p><strong>LIBRAYS MODS</strong></p>
            <p style="font-size:0.7rem; color:var(--gray-light);">Sua loja de apps modificados</p>
            <div class="creator" style="margin-top:1rem; font-size:0.7rem;">Criado por @danielz7</div>
        </div>
    </div>

    <script>
        const GITHUB_BASE = "https://raw.githubusercontent.com/Fu6rfho5zf/LIBRAYS-MODS/refs/heads/main/";
        const JSON_URLS = {
            destaques: GITHUB_BASE + "destaque.json",
            jogos: GITHUB_BASE + "jogo.json",
            social: GITHUB_BASE + "social.json",
            entretenimento: GITHUB_BASE + "entretenimento.json",
            musica: GITHUB_BASE + "musica.json"
        };

        const CATEGORIAS = ["jogos", "social", "entretenimento", "musica"];
        const CATEGORY_NAMES = { jogos: "🎮 JOGOS", social: "👥 SOCIAL", entretenimento: "🎬 ENTRETENIMENTO", musica: "🎵 MÚSICA" };

        let appData = { jogos: [], social: [], entretenimento: [], musica: [] };
        let allAppsRegistry = {}; 
        let destaques = [];
        let slideIndex = 0;
        let currentCategoryView = "grid";

        async function fetchJSON(url) {
            try { const res = await fetch(url); return res.ok ? await res.json() : null; } catch(e) { return null; }
        }

        function normalize(app) {
            return {
                id: app.id || app.ID || Date.now() + Math.random(),
                name: app.name || "Sem nome",
                logo: app.imagem || app.logo || app.logotipo || "",
                desc: app.descricao || app.desc || "",
                version: app.versao || "1.0",
                size: app.tamanho || "--",
                developer: app.desenvolvedor || "Desconhecido",
                link: app.link || "",
                linkArm64: app.linkArm64 || "",
                linkArm32: app.linkArm32 || "",
                price: app.preco || "Grátis",
                rating: app.rating || "4.8"
            };
        }

        async function carregarDados() {
            document.getElementById('homeSections').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const dData = await fetchJSON(JSON_URLS.destaques);
            if (dData) destaques = dData.map(a => normalize(a));
            
            for (const cat of CATEGORIAS) {
                const data = await fetchJSON(JSON_URLS[cat]);
                if (data) {
                    appData[cat] = data.map(a => normalize(a));
                    appData[cat].forEach(app => allAppsRegistry[app.id] = app);
                }
            }
            renderizarTudo();
        }

        function renderizarCard(app) {
            const archBadges = (app.linkArm64 ? '<span class="arch-badge arm64">64bit</span> ' : '') + (app.linkArm32 ? '<span class="arch-badge arm32">32bit</span>' : '');
            return `
            <div class="app-card" onclick="abrirDetalhes('${app.id}')">
                <div class="app-banner"><img src="${app.logo}" class="app-banner-img" onerror="this.src='https://via.placeholder.com/150'"></div>
                <div class="app-info">
                    <div class="app-header">
                        <div class="app-logo"><img src="${app.logo}" class="app-logo-img"></div>
                        <div class="app-title">
                            <h4>${app.name}</h4>
                            <div class="app-developer">${app.developer}</div>
                        </div>
                    </div>
                    <div class="app-description">${app.desc}</div>
                    <div style="margin-top:5px;">${archBadges}</div>
                </div>
            </div>`;
        }

        function renderizarHome() {
            let html = '';
            for (const cat of CATEGORIAS) {
                const apps = appData[cat] || [];
                if (!apps.length) continue;
                html += `<div class="section"><div class="section-header"><h2 class="section-title">${CATEGORY_NAMES[cat]}</h2><span style="color:var(--primary);cursor:pointer;" onclick="showCategoryPage('${cat}')">Ver tudo</span></div><div class="horizontal-scroll">${apps.map(a => renderizarCard(a)).join('')}</div></div>`;
            }
            document.getElementById('homeSections').innerHTML = html;
        }

        function renderizarCarrossel() {
            const cont = document.getElementById('carouselSlides');
            const dots = document.getElementById('carouselDots');
            if (!destaques.length) return;
            cont.innerHTML = destaques.map((a, i) => `<div class="carousel-slide ${i===0?'active':''}" onclick="abrirDetalhes('${a.id}')"><img src="${a.logo}" class="carousel-banner-img"><div class="carousel-content"><h2>${a.name}</h2><p>${a.desc.substring(0,60)}...</p></div></div>`).join('');
            dots.innerHTML = destaques.map((_, i) => `<div class="carousel-dot ${i===0?'active':''}" onclick="irParaSlide(${i})"></div>`).join('');
        }

        function abrirDetalhes(id) {
            const app = allAppsRegistry[id] || destaques.find(a => a.id == id);
            if (!app) return;
            document.getElementById('modalLogo').innerHTML = `<img src="${app.logo}" style="width:100%; height:100%; object-fit:cover;">`;
            document.getElementById('modalTitle').innerText = app.name;
            document.getElementById('modalInfo').innerHTML = `<div style="text-align:center;"><small>Tamanho</small><br><b>${app.size}</b></div><div style="text-align:center;"><small>Versão</small><br><b>${app.version}</b></div><div style="text-align:center;"><small>Rating</small><br><b>${app.rating}</b></div>`;
            document.getElementById('modalDescription').innerText = app.desc;
            
            let btnHtml = '';
            if (app.linkArm64) btnHtml += `<button onclick="window.open('${app.linkArm64}')" style="width:100%; padding:12px; border:none; background:var(--success); color:white; border-radius:10px; margin-bottom:5px; font-weight:bold;">DOWNLOAD 64 BITS</button>`;
            if (app.linkArm32) btnHtml += `<button onclick="window.open('${app.linkArm32}')" style="width:100%; padding:12px; border:none; background:var(--warning); color:white; border-radius:10px; margin-bottom:5px; font-weight:bold;">DOWNLOAD 32 BITS</button>`;
            if (!app.linkArm64 && !app.linkArm32 && app.link) btnHtml += `<button onclick="window.open('${app.link}')" style="width:100%; padding:12px; border:none; background:var(--primary); color:white; border-radius:10px; font-weight:bold;">BAIXAR AGORA</button>`;
            
            document.getElementById('modalDownloadButtons').innerHTML = btnHtml;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.getElementById(p + 'Page').style.display = 'block';
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-page') === p));
        }

        function showCategoryPage(cat) {
            const grid = CATEGORIAS.includes(cat) ? appData[cat] : [];
            document.getElementById('categoryAppsContainer').innerHTML = `<div class="apps-grid-2cols">${grid.map(a => renderizarCard(a)).join('')}</div>`;
            showPage('categories');
        }

        function handleSearchInput() {
            const term = document.getElementById('searchInputMain').value.toLowerCase();
            const results = Object.values(allAppsRegistry).filter(a => a.name.toLowerCase().includes(term));
            document.getElementById('searchResultsGrid').innerHTML = results.map(a => renderizarCard(a)).join('');
        }

        function irParaSlide(i) { slideIndex = i; atualizarCarrossel(); }
        function nextSlide() { slideIndex = (slideIndex + 1) % destaques.length; atualizarCarrossel(); }
        function prevSlide() { slideIndex = (slideIndex - 1 + destaques.length) % destaques.length; atualizarCarrossel(); }
        function atualizarCarrossel() {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            slides.forEach((s, i) => s.classList.toggle('active', i === slideIndex));
            dots.forEach((d, i) => d.classList.toggle('active', i === slideIndex));
        }

        function renderizarTudo() { renderizarHome(); renderizarCarrossel(); setInterval(nextSlide, 5000); }
        function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

        carregarDados();
    </script>
</body>
</html>
