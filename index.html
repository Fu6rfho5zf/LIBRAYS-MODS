    <script>
        // --- AJUSTE: URL DO NOVO REPOSITÓRIO ---
        const GITHUB_BASE = "https://raw.githubusercontent.com/Fu6rfho5zf/LIBRAYS-MODS/refs/heads/main/";
        
        const JSON_URLS = {
            destaques: GITHUB_BASE + "destaque.json",
            jogos: GITHUB_BASE + "jogo.json",
            social: GITHUB_BASE + "social.json",
            entretenimento: GITHUB_BASE + "entretenimento.json",
            musica: GITHUB_BASE + "musica.json"
        };

        const CATEGORIAS = ["jogos", "social", "entretenimento", "musica"];
        const CATEGORY_NAMES = { jogos: "🎮 JOGOS", social: "👥 SOCIAL", entretenimento: "🎬 ENTRETENIMENTO", musica: "🎵 MÚSICA" };
        const CATEGORY_ICONS = { jogos: "🎮", social: "👥", entretenimento: "🎬", musica: "🎵" };

        let appData = { jogos: [], social: [], entretenimento: [], musica: [] };
        let allAppsRegistry = {}; 
        let destaques = [];
        let downloads = [];
        let slideIndex = 0;
        let slideTimer = null;
        let currentCategory = "";
        let currentCategoryView = "grid";

        try { const saved = localStorage.getItem('librays_downloads'); if (saved) downloads = JSON.parse(saved); } catch(e) {}
        try { const savedView = localStorage.getItem('librays_category_view'); if (savedView) currentCategoryView = savedView; } catch(e) {}

        async function fetchJSON(url) {
            try {
                const res = await fetch(url);
                return res.ok ? await res.json() : null;
            } catch(e) { return null; }
        }

        function normalize(app) {
            // Se o nome for "Sem nome", tenta usar a descrição como título
            let displayName = app.name;
            if (displayName === "Sem nome" && app.desc) {
                // Pega as primeiras palavras da descrição como título
                const words = app.desc.split(' ');
                displayName = words.slice(0, 4).join(' ') + (words.length > 4 ? '...' : '');
                if (displayName.length < 5) displayName = "Destaque";
            }
            
            return {
                id: app.id || app.ID || Date.now(),
                name: displayName,
                originalName: app.name,
                logo: app.imagem || app.logo || app.logotipo || "",
                desc: app.descricao || app.desc || app.description || "",
                version: app.versao || app.version || "1.0",
                size: app.tamanho || app.size || "--",
                developer: app.desenvolvedor || app.developer || app.dev || "Desconhecido",
                link: app.link || "",
                linkArm64: app.linkArm64 || "",
                linkArm32: app.linkArm32 || "",
                hasArm64: app.hasArm64 || false,
                hasArm32: app.hasArm32 || false,
                price: app.preco || app.price || "Grátis",
                rating: app.rating || "4.8",
                isExternal: app.isExternal || false,
                externalUrl: app.externalUrl || app.link || ""
            };
        }

        async function carregarDados() {
            document.getElementById('homeSections').innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando os melhores apps...</p></div>';
            
            const destaquesData = await fetchJSON(JSON_URLS.destaques);
            if (destaquesData) destaques = destaquesData.map(a => normalize(a));
            
            for (const cat of CATEGORIAS) {
                const data = await fetchJSON(JSON_URLS[cat]);
                if (data) {
                    const normalizedApps = data.map(a => normalize(a));
                    appData[cat] = normalizedApps;
                    normalizedApps.forEach(app => {
                        const key = app.id || app.name;
                        allAppsRegistry[key] = app;
                    });
                }
            }
            renderizarTudo();
        }

        function safeStr(str) { return String(str).replace(/'/g, "\\'"); }

        function renderizarCard(app, hideDownload = true) {
            const key = safeStr(app.id || app.name);
            const logoImg = (app.logo && app.logo.startsWith('http')) ? 
                `<img src="${app.logo}" class="app-logo-img" loading="lazy">` : 
                `<span class="app-logo-placeholder">📱</span>`;
            
            const bannerImg = (app.logo && app.logo.startsWith('http')) ? 
                `<img src="${app.logo}" class="app-banner-img" loading="lazy">` : 
                `<span class="app-banner-placeholder">📱</span>`;
            
            let archBadge = '';
            if (app.hasArm64 || app.linkArm64) archBadge += '<span class="arch-badge arm64">64 BITS</span>';
            if (app.hasArm32 || app.linkArm32) archBadge += '<span class="arch-badge arm32">32 BITS</span>';
            
            return `<div class="app-card" onclick="abrirDetalhesByKey('${key}')">
                <div class="app-banner">${bannerImg}<div class="app-badge"><i class="fas fa-star"></i> ${app.price}</div></div>
                <div class="app-info">
                    <div class="app-header">
                        <div class="app-logo">${logoImg}</div>
                        <div class="app-title">
                            <h4>${app.name} ${archBadge}</h4>
                            <div class="app-developer"><i class="fas fa-user-circle"></i> ${app.developer}</div>
                            <div class="app-rating"><i class="fas fa-star"></i> ${app.rating}</div>
                        </div>
                    </div>
                    <div class="app-description">${(app.desc || '').substring(0, 60)}...</div>
                </div>
            </div>`;
        }

        function renderizarCarrossel() {
            const container = document.getElementById('carouselSlides');
            const dotsContainer = document.getElementById('carouselDots');
            if (!container) return;
            if (!destaques.length) {
                container.innerHTML = `<div class="carousel-slide active"><div class="carousel-banner" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark))"><div class="carousel-content"><h2>Librays Mods</h2><p>Apps modificados gratuitos</p></div></div></div>`;
                return;
            }
            container.innerHTML = destaques.map((item, i) => {
                const imgHtml = (item.logo && item.logo.startsWith('http')) ? `<img src="${item.logo}" class="carousel-banner-img">` : '';
                const key = safeStr(item.id || item.name);
                // Usa o nome (que já foi tratado se era "Sem nome")
                const displayTitle = item.name !== "Sem nome" ? item.name : (item.desc ? item.desc.substring(0, 30) : "Destaque");
                return `<div class="carousel-slide ${i===0?'active':''}" onclick="abrirCarrosselItem('${key}')">
                    <div class="carousel-banner" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">${imgHtml}
                        <div class="carousel-content">
                            <h2>${displayTitle}</h2>
                            <p>${item.desc || ''}</p>
                            <button class="carousel-btn" onclick="event.stopPropagation(); abrirCarrosselItem('${key}')">Ver Detalhes</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            dotsContainer.innerHTML = destaques.map((_, i) => `<div class="carousel-dot ${i===0?'active':''}" onclick="irParaSlide(${i})"></div>`).join('');
        }

        // Função para abrir item do carrossel
        function abrirCarrosselItem(key) {
            const app = allAppsRegistry[key];
            if (!app) return;
            
            // Verifica se tem link válido (não é "#" ou vazio)
            const hasValidLink = app.link && app.link !== '#' && app.link !== '';
            
            // Se tiver link válido, abre em nova aba
            if (hasValidLink) {
                window.open(app.link, '_blank');
                return;
            }
            
            // Se não tiver link, abre o modal de detalhes
            abrirDetalhes(app);
        }

        function abrirDetalhesByKey(key) { 
            const app = allAppsRegistry[key]; 
            if (app) abrirDetalhes(app); 
        }
        
        function baixarAppByKey(key) { 
            const app = allAppsRegistry[key]; 
            if (app) baixarApp(app); 
        }

        function baixarApp(app, arch = null) {
            let link = app.link;
            if (arch === 'arm64' && app.linkArm64) link = app.linkArm64;
            if (arch === 'arm32' && app.linkArm32) link = app.linkArm32;
            
            if (link && link !== '#') {
                if (!downloads.some(d => d.name === app.name)) {
                    downloads.unshift({ name: app.name, logo: app.logo, data: new Date().toLocaleString(), arch: arch });
                    atualizarDownloads();
                }
                window.open(link, '_blank');
            } else {
                showToast("Link não disponível", "warning");
            }
        }

        function atualizarDownloads() {
            localStorage.setItem('librays_downloads', JSON.stringify(downloads));
            const lista = document.getElementById('downloadsList');
            if (!lista) return;
            lista.innerHTML = downloads.map(d => `<div style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #eee;">
                <div style="width:40px;height:40px;border-radius:8px;overflow:hidden;background:#eee;">${d.logo ? `<img src="${d.logo}" style="width:100%">` : '📱'}</div>
                <div style="flex:1;"><strong style="font-size:12px;">${d.name}</strong><br><small style="font-size:10px;">${d.data}</small></div>
            </div>`).join('');
        }

        function abrirDetalhes(app) {
            const modal = document.getElementById('modal');
            document.getElementById('modalLogo').innerHTML = app.logo ? `<img src="${app.logo}" class="modal-logo-img">` : '📱';
            document.getElementById('modalTitle').innerText = app.originalName && app.originalName !== "Sem nome" ? app.originalName : app.name;
            document.getElementById('modalDeveloper').innerText = app.developer;
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star" style="color:var(--warning);"></i> ${app.rating}`;
            document.getElementById('modalInfo').innerHTML = `
                <div class="modal-info-item"><span class="modal-info-label">Tamanho</span><span class="modal-info-value">${app.size}</span></div>
                <div class="modal-info-item"><span class="modal-info-label">Versão</span><span class="modal-info-value">${app.version}</span></div>
                <div class="modal-info-item"><span class="modal-info-label">Preço</span><span class="modal-info-value">${app.price}</span></div>`;
            document.getElementById('modalDescription').innerText = app.desc;
            
            let btns = '';
            if (app.linkArm64 || app.hasArm64) btns += `<button class="modal-download-btn arm64" onclick="baixarAppByArch('${safeStr(app.id || app.name)}', 'arm64')"><i class="fas fa-download"></i> Download 64 BITS</button>`;
            if (app.linkArm32 || app.hasArm32) btns += `<button class="modal-download-btn arm32" onclick="baixarAppByArch('${safeStr(app.id || app.name)}', 'arm32')"><i class="fas fa-download"></i> Download 32 BITS</button>`;
            if (!btns && app.link && app.link !== '#') btns = `<button class="modal-download-btn" style="background:var(--primary)" onclick="baixarAppByKey('${safeStr(app.id || app.name)}')">Baixar Agora</button>`;
            if (!btns) btns = `<button class="modal-download-btn" style="background:var(--gray)" disabled>Link indisponível</button>`;
            
            document.getElementById('modalDownloadButtons').innerHTML = btns;
            modal.style.display = 'flex';
        }
        
        function baixarAppByArch(key, arch) { const app = allAppsRegistry[key]; if (app) baixarApp(app, arch); closeModal(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function renderizarHome() {
            const container = document.getElementById('homeSections');
            let html = '';
            for (const cat of CATEGORIAS) {
                const apps = appData[cat] || [];
                if (!apps.length) continue;
                let cardsHtml = apps.slice(0, 8).map(a => renderizarCard(a)).join('');
                html += `<div class="section"><div class="section-header"><h2 class="section-title">${CATEGORY_NAMES[cat]}</h2><span class="section-link" onclick="showCategoryPage('${cat}')">Ver tudo</span></div><div class="horizontal-scroll">${cardsHtml}</div></div>`;
            }
            container.innerHTML = html;
        }

        function renderizarCategorias() {
            const container = document.getElementById('allCategoriesGrid');
            container.innerHTML = CATEGORIAS.map(cat => `<div class="category-card" style="background:white;padding:15px;border-radius:20px;cursor:pointer;text-align:center;box-shadow:var(--shadow-sm);" onclick="filtrarPorCategoria('${cat}')"><span>${CATEGORY_ICONS[cat]}</span><div>${cat.toUpperCase()}</div></div>`).join('');
        }

        function setCategoryView(view) { 
            currentCategoryView = view; 
            localStorage.setItem('librays_category_view', view);
            document.querySelectorAll('.view-toggle-btn').forEach(btn => btn.classList.remove('active'));
            if(view === 'grid') document.querySelector('.view-toggle-btn:first-child').classList.add('active');
            else document.querySelector('.view-toggle-btn:last-child').classList.add('active');
            if (currentCategory) renderizarAppsCategoria(currentCategory);
        }

        function renderizarAppsCategoria(cat) {
            const apps = appData[cat] || [];
            const container = document.getElementById('categoryAppsContainer');
            const gridClass = currentCategoryView === 'grid' ? 'apps-grid-2cols' : 'apps-grid-list';
            container.innerHTML = `<div class="${gridClass}">${apps.map(a => renderizarCard(a)).join('')}</div>`;
        }

        function filtrarPorCategoria(cat) { 
            currentCategory = cat; 
            renderizarAppsCategoria(cat); 
            showPage('categories'); 
        }
        
        function showPage(pagina) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pagina + 'Page').style.display = 'block';
            if (pagina === 'categories') renderizarCategorias();
        }

        function showCategoryPage(cat) { filtrarPorCategoria(cat); }
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function toggleDownloadsPanel() { document.getElementById('downloadsPanel').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        // Funções do carrossel
        function nextSlide() { 
            if (!destaques.length) return; 
            slideIndex = (slideIndex + 1) % destaques.length; 
            atualizarCarrossel(); 
        }
        
        function prevSlide() { 
            if (!destaques.length) return; 
            slideIndex = (slideIndex - 1 + destaques.length) % destaques.length; 
            atualizarCarrossel(); 
        }
        
        function irParaSlide(i) { 
            slideIndex = i; 
            atualizarCarrossel(); 
        }
        
        function atualizarCarrossel() {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            slides.forEach((s, i) => s.classList.toggle('active', i === slideIndex));
            dots.forEach((d, i) => d.classList.toggle('active', i === slideIndex));
        }

        function renderizarTudo() { 
            renderizarCarrossel(); 
            renderizarHome(); 
            atualizarDownloads(); 
            if (slideTimer) clearInterval(slideTimer);
            slideTimer = setInterval(() => nextSlide(), 5000);
        }
        
        carregarDados();
    </script>
</body>
</html>
